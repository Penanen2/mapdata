name: Generate VFR Map Tiles

on:
  workflow_dispatch:

permissions:
  contents: write # Antaa robotille luvan tallentaa kartat GitHub Releases -sivulle

jobs:
  build_vfr_maps:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        country: [finland, sweden, germany]

    steps:
      - name: Download latest OSM data from Geofabrik
        run: |
          wget -qO raw.osm.pbf "https://download.geofabrik.de/europe/${{ matrix.country }}-latest.osm.pbf"

      - name: Generate Clean VFR PMTiles with Planetiler
        # Täydellinen VFR-profiili:
        # - simplify-tolerance=1.0 pitää rantaviivat tarkkoina.
        # - exclude-layers: poistetaan "landuse" (poistaa levottomat alueet),
        #   "waterway" (poistaa pikkuojat), mutta PIDETÄÄN "place" (kaupungit)
        #   ja "aeroway" (lentokentät).
        run: |
          docker run --rm \
            -e JAVA_TOOL_OPTIONS="-Xmx5g" \
            -v "${{ github.workspace }}:/data" \
            ghcr.io/onthegomap/planetiler:latest \
            --download \
            --osm-path=/data/raw.osm.pbf \
            --output=/data/${{ matrix.country }}_vfr.pmtiles \
            --maxzoom=11 \
            --simplify-tolerance=1.0 \
            --exclude-layers=poi,building,housenumber,park,mountain_peak,address,waterway,landuse \
            --fetch-wikidata=false \
            --force

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: vfr-maps-latest
          name: "Latest VFR Base Maps"
          files: ${{ matrix.country }}_vfr.pmtiles
          make_latest: true
